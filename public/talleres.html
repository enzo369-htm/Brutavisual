<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talleres — BRUTA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: #000;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        opacity: 0.75;
      }

      .desktop-only-gate {
        display: none;
      }

      @media (max-width: 768px) {
        html,
        body {
          overflow: hidden;
          height: 100%;
          height: 100dvh;
        }

        .desktop-only-gate {
          display: flex;
          align-items: center;
          justify-content: center;
          position: fixed;
          inset: 0;
          z-index: 99999;
          padding: clamp(1.25rem, 5vw, 2rem);
          background: #0a0a0a;
          color: #f0f0f0;
          text-align: center;
        }

        .desktop-only-gate__inner {
          max-width: 22rem;
        }

        .desktop-only-gate__title {
          margin: 0 0 1rem;
          font-family: "Oswald", "Arial Narrow", sans-serif;
          font-size: clamp(1.35rem, 5vw, 1.65rem);
          font-weight: 600;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        .desktop-only-gate__text {
          margin: 0;
          font-size: 0.9375rem;
          line-height: 1.55;
          color: #b0b0b0;
        }

        .desktop-only-gate__text strong {
          color: #e8e8e8;
          font-weight: 600;
        }
      }

      .site-top {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.75rem clamp(1.25rem, 4vw, 3.5rem);
        font-size: 0.8125rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        background: rgba(0, 0, 0, 0.88);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .site-top__brand {
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      .site-top__menu {
        display: flex;
        flex-wrap: wrap;
        gap: clamp(0.75rem, 3vw, 2rem);
        justify-content: flex-end;
      }

      .site-top__menu a[aria-current="page"] {
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      .taller-panel {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
      }

      .taller-panel video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div
      class="desktop-only-gate"
      role="dialog"
      aria-modal="true"
      aria-labelledby="desktop-only-title"
    >
      <div class="desktop-only-gate__inner">
        <p id="desktop-only-title" class="desktop-only-gate__title">
          Solo escritorio
        </p>
        <p class="desktop-only-gate__text">
          Esta web está pensada para verse en
          <strong>computadora</strong>. Para verla como corresponde, abrila
          desde un escritorio o notebook (pantalla más ancha).
        </p>
      </div>
    </div>

    <header class="site-top">
      <a class="site-top__brand" href="index.html">BRUTA</a>
      <nav class="site-top__menu" aria-label="Principal">
        <a href="index.html">Proyectos</a>
        <a href="informacion.html">Información</a>
        <a href="talleres.html" aria-current="page">Talleres</a>
        <a href="index.html">Novedades</a>
        <a href="index.html">Contacto</a>
      </nav>
    </header>

    <main aria-label="Talleres">
      <section
        id="taller-panel-1"
        class="taller-panel"
        aria-label="Taller BRUTA — parte uno"
      >
        <video
          id="video-taller-1"
          src="taller BRUTA.mp4"
          playsinline
          muted
          autoplay
          preload="auto"
        ></video>
      </section>
      <section
        id="taller-panel-2"
        class="taller-panel"
        aria-label="Taller BRUTA — parte dos"
      >
        <video
          id="video-taller-2"
          src="Taller BRUTA 2.mp4"
          playsinline
          preload="auto"
        ></video>
      </section>
    </main>

    <script>
      (function () {
        var v1 = document.getElementById("video-taller-1");
        var v2 = document.getElementById("video-taller-2");
        var p2 = document.getElementById("taller-panel-2");
        if (!v1 || !v2 || !p2) return;

        var reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        function tryPlayMuted(el) {
          el.muted = true;
          var p = el.play();
          if (p && p.catch) {
            p.catch(function () {});
          }
        }

        v1.addEventListener("ended", function () {
          p2.scrollIntoView({
            behavior: reduceMotion ? "auto" : "smooth",
            block: "start",
          });
          v2.currentTime = 0;
          v2.muted = false;
          var playSecond = v2.play();
          if (playSecond && playSecond.catch) {
            playSecond.catch(function () {
              tryPlayMuted(v2);
            });
          }
        });

        var first = v1.play();
        if (first && first.catch) {
          first.catch(function () {
            tryPlayMuted(v1);
          });
        }
      })();
    </script>
  </body>
</html>
